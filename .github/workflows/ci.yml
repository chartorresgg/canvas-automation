# .github/workflows/ci.yml
# Pipeline de integración continua — Canvas LMS Automation App
# Se ejecuta automáticamente en cada push y Pull Request a main

name: CI — Canvas LMS Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Tests del backend ──────────────────────────────────────
  backend-tests:
    name: Backend — pytest (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ejecutar tests unitarios
        working-directory: backend
        run: pytest tests/unit/ -v --tb=short

      - name: Generar reporte de cobertura
        working-directory: backend
        run: pytest tests/unit/ --cov=app --cov-report=term-missing --tb=short

  # ── Job 2: Verificación del frontend ─────────────────────────────
  frontend-check:
    name: Frontend — TypeScript (Node 18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Verificar tipos TypeScript
        working-directory: frontend
        run: npx tsc --noEmit